<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password · Modules</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/auth/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <h1>Modules</h1>
        <p>St Andrews course planner</p>
      </div>

      <h2>Choose a new password</h2>
      <p class="subtitle">Pick something at least 8 characters long.</p>

      <form id="reset-form" class="auth-form" novalidate>
        <div class="field">
          <label for="password">New password</label>
          <div class="password-field" data-password-toggle>
            <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8">
            <button type="button" class="password-toggle" aria-label="Show password"></button>
          </div>
        </div>

        <div class="field">
          <label for="confirm">Confirm password</label>
          <div class="password-field" data-password-toggle>
            <input id="confirm" name="confirm" type="password" autocomplete="new-password" required minlength="8">
            <button type="button" class="password-toggle" aria-label="Show password"></button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Update password</button>

        <div id="message" class="message hidden"></div>
      </form>

      <p class="alt-link">
        <a href="/login.html">Back to sign in</a>
      </p>
    </section>
  </main>

  <script type="module" src="./src/auth/showPassword.js"></script>
  <script type="module" src="./src/auth/reset.js"></script>
</body>
</html>
