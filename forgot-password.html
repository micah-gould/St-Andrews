<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot password · Modules</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/auth/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <h1>Modules</h1>
        <p>St Andrews course planner</p>
      </div>

      <h2>Reset your password</h2>
      <p class="subtitle">Enter your email and we'll send you a link.</p>

      <form id="forgot-form" class="auth-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Send reset link</button>

        <div id="message" class="message hidden"></div>
      </form>

      <p class="alt-link">
        <a href="/login.html">Back to sign in</a>
      </p>
    </section>
  </main>

  <script type="module" src="./src/auth/forgot.js"></script>
</body>
</html>
