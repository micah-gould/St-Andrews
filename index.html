<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Module Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-left">
        <h1 class="logo">Modules</h1>

        <div class="legend">
          <span class="leg"><span class="dot" style="background:var(--c-1000)"></span>1000</span>
          <span class="leg"><span class="dot" style="background:var(--c-2000)"></span>2000</span>
          <span class="leg"><span class="dot" style="background:var(--c-3000)"></span>3000</span>
          <span class="leg"><span class="dot" style="background:var(--c-4000)"></span>4000</span>
          <span class="divider"></span>
          <span class="leg"><span class="dot" style="background:var(--c-sel)"></span>Selected</span>
          <span class="leg"><span class="dot" style="background:var(--c-excl)"></span>Excluded</span>
          <span class="leg"><span class="dot" style="background:var(--c-pre)"></span>Prereqs</span>
          <span class="leg"><span class="dot" style="background:var(--c-fwd)"></span>Unlocks</span>
        </div>
      </div>

      <div class="toolbar-right">
        <button class="clear-btn" id="clear-all" type="button">Clear all</button>

        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          <input id="search" type="text" placeholder="Search modules..." autocomplete="off" spellcheck="false">
        </div>
      </div>
    </header>

    <section id="saved-settings-panel" aria-label="Saved settings">
      <div class="saved-settings-copy">
        <strong>Saved comparisons</strong>
        <span>Switch catalogs, save combinations, and reload them later.</span>
      </div>
      <div class="saved-settings-controls">
        <label class="field-group" for="catalog-select">
          <span>Catalog</span>
          <select id="catalog-select" aria-label="Course catalog"></select>
        </label>
      </div>
      <form id="settings-form" class="settings-form">
        <input id="settings-name" name="name" type="text" maxlength="80" placeholder="e.g. Pure maths path">
        <button id="save-settings" type="submit">Save current</button>
      </form>
      <div class="saved-settings-controls">
        <select id="saved-settings-list" aria-label="Saved settings list">
          <option value="">No saved settings yet</option>
        </select>
        <button id="load-settings" type="button">Load</button>
        <button id="delete-settings" type="button" class="clear-btn">Delete</button>
      </div>
      <div id="settings-feedback" aria-live="polite"></div>
    </section>

    <div id="graph-area">
      <svg id="graph-svg"></svg>
      <aside id="tip"></aside>
    </div>

    <footer id="status">
      <div id="status-text">Loading module data...</div>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
